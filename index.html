<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | QR code component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
      body {
        font-family: "Outfit", sans-serif;
        box-sizing: border-box;
        min-height: 100vh;
        margin: 0px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: repeating-linear-gradient(
          90deg,
          hsl(211, 57%, 85%) 0 56px,
          hsl(212, 50%, 87%) 56px 100px
        );
      }
      .card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        width: 320px;
        height: 499px;
        padding: 16px 16px 40px 16px;
        background: white;
        border-radius: 20px;
      }
      .image-qr-code {
        width: 100%;
        height: 100%;
        border-radius: 10px;
      }
      .content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      h2 {
        font-size: 22px;
        text-align: center;
        margin: 0;
      }
      p{
        text-align: center;
        font-size: 15px;
        color: slategray;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="image-qr-code" src="images/image-qr-code.png" alt="qr-code" />
      <div class="content">
        <h2>Improve your front-end 

        </br>skills by building projects
      </h2>
        <p>
          Scan the QR code to visit Frontend </br>Mentor and take your coding skills
          to </br>the next level
        </p>
      </div>
    </div>
  </body>
</html>
